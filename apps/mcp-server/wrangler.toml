name = "agentbazaar-mcp"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_VERSION = "0.2.0"
API_URL = "https://agentbazaar-api.r-443.workers.dev"
RPC_URL = "https://devnet.helius-rpc.com/?api-key=e182b4e3-830d-4584-8d17-10030d7a6d5f"

# Secrets (set via `wrangler secret put <KEY> --env production`):
#   MCP_AUTH_TOKEN — shared Bearer token for LLM agent clients
#   API_URL        — override base URL for the Discovery API
#   RPC_URL        — Solana RPC endpoint for unsigned tx construction (write tools)
#
# Served at: https://agentbazaar-mcp.r-443.workers.dev

[env.production]
name = "agentbazaar-mcp"
vars = { APP_VERSION = "0.2.0", API_URL = "https://agentbazaar-api.r-443.workers.dev", RPC_URL = "https://devnet.helius-rpc.com/?api-key=e182b4e3-830d-4584-8d17-10030d7a6d5f" }
