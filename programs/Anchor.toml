[programs.devnet]
bazaar_escrow = "EhFptDs4mz6rt7HDmt8pB7ZogiqxUMVhpjB3NvToXxW2"
bazaar_evaluator = "BxctnHyx9UJT7XobxHK3X548sSoPQB96Ca2fMEzYYMS8"
bazaar_registry = "ADWoSmfUWLLRGMWZ61xuAMPhDgG77ziqAC5MA9voqLn3"
bazaar_sla = "26rhkrBkf75ijDoDuhed8m94FkuhB2MukvqtWYEDegd8"

[programs.localnet]
bazaar_escrow = "EhFptDs4mz6rt7HDmt8pB7ZogiqxUMVhpjB3NvToXxW2"
bazaar_evaluator = "BxctnHyx9UJT7XobxHK3X548sSoPQB96Ca2fMEzYYMS8"
bazaar_registry = "ADWoSmfUWLLRGMWZ61xuAMPhDgG77ziqAC5MA9voqLn3"
